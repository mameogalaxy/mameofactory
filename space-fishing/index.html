<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>STELLAR ANGLER 〜伝説のヌシを求めて〜</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="stage">
  <canvas id="game" width="960" height="600"></canvas>

  <!-- 操作ガイド（PC用・タッチ環境では非表示） -->
  <div id="hint" class="hint">
    キーボード： 左スティック=<b>WASD</b> / 右スティック=<b>方向キー</b> / 決定=<b>Space</b> / エレキ=<b>E</b> ／ ゲームパッド対応
  </div>

  <!-- 縦持ち時の回転うながし -->
  <div id="rotate" class="rotate">📱↻ 横向きにすると遊びやすいよ</div>

  <div id="loading" class="overlay">
    <div class="loadbox">
      <div class="logo-mini">🎣🪐</div>
      <div>NOW LOADING...</div>
      <div class="bar"><div id="loadbar"></div></div>
    </div>
  </div>
</div>

<script src="js/utils.js"></script>
<script src="js/input.js"></script>
<script src="js/audio.js"></script>
<script src="js/fish.js"></script>
<script src="js/planets.js"></script>
<script src="js/game.js"></script>
</body>
</html>
